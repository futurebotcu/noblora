name: noblara
description: Noblara — Elite Black & Gold dating app
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  supabase_flutter: ^2.9.0
  flutter_riverpod: ^2.6.1
  google_fonts: ^6.2.1
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  flutter_svg: ^2.0.17
  flutter_dotenv: ^5.2.1
  http: ^1.2.2
  intl: ^0.19.0
  image_picker: ^1.1.2
  url_launcher: ^6.3.1
  shared_preferences: ^2.3.4
  device_info_plus: ^10.1.0
  geolocator: ^13.0.2
  geocoding: ^3.0.0
  firebase_core: ^3.13.0
  firebase_messaging: ^15.2.4
  flutter_local_notifications: ^18.0.1
  video_thumbnail: ^0.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/images/
    - assets/icons/
    - assets/data/world_countries.geojson

  # Fonts are loaded via google_fonts package at runtime.
  # Place custom OTF/TTF files under assets/fonts/ when offline bundling is needed.
